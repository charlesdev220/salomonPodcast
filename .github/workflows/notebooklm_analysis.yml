name: NotebookLM Daily Analysis

on:
  push:
    branches:
      - feature/mcpNotebookLm
  pull_request:
    branches:
      - feature/mcpNotebookLm
  schedule:
    # Corre todos los días a las 03:00 AM UTC (Ajustable)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  analyze-notebooklm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          pip install notebooklm-mcp-server

      - name: Setup NotebookLM Auth
        run: |
          mkdir -p ~/.notebooklm-mcp
          echo '${{ secrets.NOTEBOOKLM_AUTH_JSON }}' > ~/.notebooklm-mcp/auth.json
          # Verificar que el archivo se creó correctamente (sin mostrar contenido sensible)
          ls -la ~/.notebooklm-mcp/auth.json

      - name: Run NotebookLM Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          NOTEBOOKLM_MCP_PATH: "notebooklm-mcp"
        run: node scripts/analyze_with_notebooklm.mjs
