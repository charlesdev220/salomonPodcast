name: Daily Salomon Podcast Processor 2

on:
  schedule:
    # Corre todos los días a las 02:00 AM UTC (Ajustable a cuando Salomon suele terminar sus directos)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  process-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm ci

      - name: Check if Video Exists
        id: check_video
        env:
          YOUTUBE_URL: "https://www.youtube.com/@AlejandroSalomonEmprendeduro/streams"
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: node scripts/check_video.js

      - name: Install yt-dlp
        if: steps.check_video.outputs.video_exists != 'true'
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install FFmpeg
        if: steps.check_video.outputs.video_exists != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup YouTube Cookies
        if: steps.check_video.outputs.video_exists != 'true'
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > cookies.txt
          fi

      - name: Run Processing Script
        if: steps.check_video.outputs.video_exists != 'true'
        env:
          YOUTUBE_URL: "https://www.youtube.com/@AlejandroSalomonEmprendeduro/streams"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: node scripts/process_video.js
